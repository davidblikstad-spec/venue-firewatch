# Copy to config.yaml and edit. Safe to commit (no secrets) — but your
# recipients' phone numbers are personal data, so consider gitignoring it.

# Who gets SMS alerts. msisdn = international format, digits only, no '+'.
# priority: lower = alerted first. Same priority = alerted together.
# When an alert goes unacknowledged for FW_ESCALATION_TIMEOUT_MINUTES,
# it escalates to the next priority tier.
recipients:
  - name: Duty manager
    msisdn: "4799999999"
    priority: 0
  - name: Technical lead
    msisdn: "4788888888"
    priority: 0
  - name: Venue owner
    msisdn: "4777777777"
    priority: 1

# Zones that EVENT (silent) mode silences. Detectors in any other zone keep
# alerting even during an event.
silent_zones_in_event:
  - stage

# Interconnect: when a detector trips (and is not silenced by EVENT mode),
# sound every siren-capable detector — see `siren_property` per detector below.
# Each remote siren self-stops after siren_max_duration_s, so a dropped broker
# or missed "all clear" can never latch the buzzers on indefinitely. The
# dashboard has a "Silence all sirens" button to drop them early.
siren_interconnect: false
siren_max_duration_s: 300

# Each detector must match a Zigbee2MQTT friendly_name exactly.
# IMPORTANT: confirm `alarm_property` against the values your device actually
# exposes in the Z2M frontend. For the frient HESZB-120 heat alarm it is
# typically "heat"; a smoke alarm exposes "smoke". When unsure, watch the
# device's JSON in Z2M and use the boolean field that flips on detection.
# `siren_property` is the SETTABLE field that sounds the buzzer (Develco
# SMSZB-120 exposes "alarm"); omit it for devices with no remote siren.
detectors:
  - friendly_name: heat_stage_left
    label: Stage left
    kind: heat
    alarm_property: heat
    zone: stage
    offline_after_hours: 6

  - friendly_name: smoke_lobby
    label: Lobby
    kind: smoke
    alarm_property: smoke
    siren_property: alarm
    zone: front_of_house
    offline_after_hours: 6

  - friendly_name: smoke_rack_room
    label: Rack room
    kind: smoke
    alarm_property: smoke
    siren_property: alarm
    zone: technical
    offline_after_hours: 6
